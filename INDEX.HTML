body{background:#0b1120;color:#fff}

let phoneVal = document.getElementById('phone').value;
let msgVal = document.getElementById('msg').value;

let text = `🔥 NEW ENQUIRY 🔥

📝 Work: ${msgVal}`;

let wa = "https://wa.me/917081573977?text=" + encodeURIComponent(text);

}
